title: AI Developer Learning Diary
description: Quick-reference memory refresher for the Edukamu AI Developer program (10 ECTS)
url: ""
baseurl: ""

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

# Search
search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

# Aux links (top-right)
aux_links:
  "NotebookLM":
    - "https://notebooklm.google.com"
  "Edukamu":
    - "https://skill.edukamu.fi/aideveloper/"

aux_links_new_tab: true

# Footer
footer_content: "AI Developer Program &mdash; Microsoft Skills for Jobs (10 ECTS) via Edukamu"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# Exclude non-site files
exclude:
  - Gemfile.lock
  - node_modules
  - vendor

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
